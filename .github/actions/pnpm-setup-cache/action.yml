name: pnpm setup with node_modules cache
description: Run pnpm install once and save node_modules to the Actions cache for downstream jobs.

inputs:
  node-version:
    description: Node.js version
    required: true
  pnpm-version:
    description: pnpm version
    required: true
  install-dependencies:
    description: Run pnpm install before saving cache
    required: false
    default: 'true'

outputs:
  cache-key:
    description: Cache key for pnpm-restore-cache
    value: ${{ steps.cache-keys.outputs.cache-key }}
  cache-hit:
    description: Whether node_modules was restored from cache
    value: ${{ steps.cache-node-modules.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - name: Generate cache keys
      id: cache-keys
      shell: bash
      run: |
        NODE_VERSION="${{ inputs.node-version }}"
        PNPM_VERSION="${{ inputs.pnpm-version }}"
        BASE_KEY="pnpm-node-modules-${{ runner.os }}-${NODE_VERSION}-${PNPM_VERSION}"
        HASH_KEY="${BASE_KEY}-${{ hashFiles('pnpm-lock.yaml', 'package.json') }}"
        echo "cache-key=${HASH_KEY}" >> "$GITHUB_OUTPUT"
        echo "base-key=${BASE_KEY}" >> "$GITHUB_OUTPUT"

    - name: Setup pnpm
      uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      with:
        version: ${{ inputs.pnpm-version }}

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        cache-dependency-path: pnpm-lock.yaml

    - name: Install dependencies
      if: inputs.install-dependencies == 'true'
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Save node_modules cache
      id: cache-node-modules
      uses: actions/cache@v4
      with:
        path: node_modules
        key: ${{ steps.cache-keys.outputs.cache-key }}
        restore-keys: |
          ${{ steps.cache-keys.outputs.base-key }}-
